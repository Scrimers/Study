<!doctype html>
<html>
	<head>
		<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
		<style>
			body {
            display: flex; /* flexbox를 사용하여 가로로 배치 */
        }
        #a {
            width: 300px;
            height: 200px;
            overflow-y: scroll; /* 스크롤 가능하도록 설정 */
            border: 1px solid black;
            margin-right: 10px; /* a와 b 사이의 간격 */
        }
        #b {
            width: 200px;
            height: 200px;
            border: 1px solid red;
        }
		</style>
	</head>
	<body>
		
		
		<div id="a">
			<p>내용 1</p>
			<p>내용 2</p>
			<p>내용 3</p>
			<p>내용 4</p>
			<p>내용 5</p>
			<p>내용 6</p>
			<p>내용 7</p>
			<p>내용 8</p>
			<p>내용 9</p>
			<p>내용 10</p>
		</div>
		<div id="b">
			<p>내용 A</p>
			<p>내용 B</p>
			<p>내용 C</p>
			<p>내용 D</p>
			<p>내용 E</p>
			<p>내용 F</p>
			<p>내용 G</p>
			<p>내용 H</p>
			<p>내용 I</p>
			<p>내용 J</p>
		</div>
	
		<script>
			const aDiv = document.getElementById('a');
			const bDiv = document.getElementById('b');
	
			function updateBPosition() {
				const aRect = aDiv.getBoundingClientRect(); // a div의 위치 정보 가져오기
				bDiv.style.position = 'absolute'; // b div의 위치를 절대 위치로 설정
				bDiv.style.top = `${aRect.top}px`; // a div의 top 위치에 맞추기
				bDiv.style.left = `${aRect.right + 10}px`; // a div의 오른쪽에 위치하도록 설정
			}
	
			// 스크롤 이벤트 리스너 추가
			aDiv.addEventListener('scroll', updateBPosition);
			// 초기 위치 업데이트
			updateBPosition();
			// 윈도우 크기 변경 시에도 위치 업데이트
			window.addEventListener('resize', updateBPosition);
		</script>
		
		

	</body>
</html>
